<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | TaskFlow</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=3">
    <link rel="alternate icon" href="/favicon.svg?v=3">
    <link rel="mask-icon" href="/favicon.svg?v=3" color="#D97706">
    <link rel="apple-touch-icon" href="/favicon.svg?v=3">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/layout.css">
    <!-- View-specific styles will be added dynamically or included here -->
    <link rel="stylesheet" href="/css/pages/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div class="app-shell">
        <!-- Dynamic Background Glows -->
        <div class="glow-container">
            <div id="glow-1" class="glow-segment glow-1"></div>
            <div id="glow-2" class="glow-segment glow-2"></div>
            <div id="glow-3" class="glow-segment glow-3"></div>
            <div id="glow-4" class="glow-segment glow-4"></div>
            <div id="glow-5" class="glow-segment glow-5"></div>
            <div id="glow-6" class="glow-segment glow-6"></div>
            <div id="glow-7" class="glow-segment glow-7"></div>
            <div id="glow-8" class="glow-segment glow-8"></div>
            <div id="glow-9" class="glow-segment glow-9"></div>
            <div id="glow-10" class="glow-segment glow-10"></div>
        </div>

        <!-- Sidebar -->
        <aside class="sidebar">
            <a href="/" class="sidebar-logo" style="text-decoration: none; color: inherit; display: flex; align-items: center; gap: 12px; margin-bottom: 32px; transition: transform 0.2s ease;" onmouseover="this.style.transform='scale(1.02)'" onmouseout="this.style.transform='scale(1)'">
                <div class="logo-icon-mini" style="width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent-cyan), var(--accent-blue)); border-radius: 8px; display: flex; align-items: center; justify-content: center; color: #000; box-shadow: 0 4px 12px rgba(250, 204, 21, 0.2);">
                    <i data-lucide="zap" style="width: 18px; height: 18px; stroke-width: 2.5px;"></i>
                </div>
                <span style="font-weight: 500; font-size: 18px;">Task<span style="font-weight: 800; color: var(--accent-cyan);">Flow</span></span>
            </a>
            
            <nav class="nav-list">
                <div class="nav-item">
                    <a href="#dashboard" class="nav-link active" data-view="dashboard">
                        <i data-lucide="layout-dashboard"></i>
                        <span>Dashboard</span>
                    </a>
                </div>
                <div class="nav-item">
                    <a href="#tasks" class="nav-link" data-view="tasks">
                        <i data-lucide="list-todo"></i>
                        <span>Tasks</span>
                    </a>
                </div>
                <div class="nav-item">
                    <a href="#board" class="nav-link" data-view="board">
                        <i data-lucide="kanban"></i>
                        <span>Kanban Board</span>
                    </a>
                </div>
                <div class="nav-item">
                    <a href="#calendar" class="nav-link" data-view="calendar">
                        <i data-lucide="calendar"></i>
                        <span>Calendar</span>
                    </a>
                </div>
                <div class="nav-item">
                    <a href="#settings" class="nav-link" data-view="settings">
                        <i data-lucide="settings"></i>
                        <span>Settings</span>
                    </a>
                </div>
            </nav>

            <div class="sidebar-footer">
                <a href="#" id="logout-btn" class="nav-link" style="color: var(--danger);">
                    <i data-lucide="log-out"></i>
                    <span>Logout</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-container">
            <header class="top-bar">
                <div class="search-wrapper" style="width: 300px;">
                    <!-- Search bar placeholder -->
                </div>
                <div class="user-profile-nav" style="display: flex; align-items: center; gap: 12px;">
                    <button id="theme-toggle" class="btn btn-ghost">
                        <i data-lucide="sun" id="theme-icon-sun"></i>
                        <i data-lucide="moon" id="theme-icon-moon" style="display: none;"></i>
                    </button>
                    <div class="user-avatar" id="user-avatar-top" style="width: 32px; height: 32px; border-radius: 50%; background: var(--bg-elevated); display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 12px; cursor: pointer; transition: transform 0.2s ease;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                        U
                    </div>
                </div>
            </header>

            <div id="view-content" class="content-area">
                <!-- Views will be injected here -->
                <div id="dashboard-view">
                    <h1>Welcome back, <span id="user-name-greeting">User</span>!</h1>
                    <!-- Dashboard content -->
                </div>
            </div>
        </main>

        <!-- Mobile Bottom Nav -->
        <nav class="bottom-nav">
            <a href="#dashboard" class="nav-link active"><i data-lucide="layout-dashboard"></i></a>
            <a href="#tasks" class="nav-link"><i data-lucide="list-todo"></i></a>
            <a href="#calendar" class="nav-link"><i data-lucide="calendar"></i></a>
            <a href="#settings" class="nav-link"><i data-lucide="settings"></i></a>
        </nav>
    </div>

    <!-- Scripts -->
    <script src="/js/utils.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/socket.js"></script>
    <script src="/js/effects.js"></script>
    <script src="/js/main.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
