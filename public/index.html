<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Work Smarter, Together</title>
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/components.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 var(--space-6);
            background: radial-gradient(circle at top center, rgba(0, 229, 255, 0.05) 0%, transparent 70%);
        }

        .hero-logo {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            margin-bottom: var(--space-10);
            font-size: 24px;
            font-weight: 800;
            color: var(--accent-cyan);
        }

        .hero h1 {
            font-size: clamp(40px, 8vw, 80px);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: var(--space-6);
            letter-spacing: -0.04em;
        }

        .hero h1 span {
            background: linear-gradient(to right, var(--accent-cyan), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: clamp(16px, 2vw, 20px);
            color: var(--text-secondary);
            max-width: 600px;
            margin-bottom: var(--space-10);
            line-height: 1.6;
        }

        .hero-actions {
            display: flex;
            gap: var(--space-4);
        }

        .hero-visual {
            margin-top: var(--space-20);
            width: 100%;
            max-width: 1000px;
            height: 400px;
            background-color: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.5);
            position: relative;
            overflow: hidden;
            transform: perspective(1000px) rotateX(10deg);
        }

        .hero-visual::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(135deg, rgba(0, 229, 255, 0.1) 0%, transparent 50%);
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="hero-logo">
            <i data-lucide="layers"></i>
            <span>TaskFlow</span>
        </div>
        
        <h1>The next generation of <br><span>productivity.</span></h1>
        
        <p>A unified workspace for tasks, kanban boards, and real-time collaboration. Built for speed, designed for clarity.</p>
        
        <div class="hero-actions">
            <a href="/register" class="btn btn-primary" style="padding: 16px 32px; font-size: 16px;">Get Started — it's free</a>
            <a href="/login" class="btn btn-secondary" style="padding: 16px 32px; font-size: 16px;">Log In</a>
        </div>

        <div class="hero-visual">
            <!-- Simulated app interface -->
            <div style="padding: 24px; border-bottom: 1px solid var(--border); display: flex; gap: 12px;">
                <div style="width: 12px; height: 12px; border-radius: 50%; background: var(--danger);"></div>
                <div style="width: 12px; height: 12px; border-radius: 50%; background: var(--warning);"></div>
                <div style="width: 12px; height: 12px; border-radius: 50%; background: var(--success);"></div>
            </div>
            <div style="padding: 40px; display: flex; gap: 40px;">
                <div style="flex: 1; height: 300px; background: var(--bg-elevated); border-radius: 12px; border: 1px solid var(--border);"></div>
                <div style="flex: 1; height: 300px; background: var(--bg-elevated); border-radius: 12px; border: 1px solid var(--border);"></div>
                <div style="flex: 1; height: 300px; background: var(--bg-elevated); border-radius: 12px; border: 1px solid var(--border);"></div>
            </div>
        </div>
    </section>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
