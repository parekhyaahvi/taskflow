<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TaskFlow</title>
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1 class="auth-title">Welcome Back</h1>
                <p class="auth-subtitle">Log in to your TaskFlow account.</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <label class="form-label" for="password">Password</label>
                        <a href="#" class="auth-link" style="font-size: 12px; margin-bottom: var(--space-2);">Forgot Password?</a>
                    </div>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width: 100%;">
                    Log In
                </button>
            </form>

            <div class="divider">or continue with</div>

            <div class="social-auth">
                <button class="btn btn-secondary">
                    <i data-lucide="github"></i> GitHub
                </button>
                <button class="btn btn-secondary">
                    <i data-lucide="chrome"></i> Google
                </button>
            </div>

            <p class="auth-footer">
                Don't have an account? <a href="/register" class="auth-link">Sign Up</a>
            </p>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
