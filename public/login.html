<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TaskFlow</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=3">
    <link rel="alternate icon" href="/favicon.svg?v=3">
    <link rel="mask-icon" href="/favicon.svg?v=3" color="#D97706">
    <link rel="apple-touch-icon" href="/favicon.svg?v=3">
    <link rel="stylesheet" href="/css/variables.css">
    <link rel="stylesheet" href="/css/reset.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <!-- Dynamic Background Glows -->
    <div class="glow-container">
        <div id="glow-1" class="glow-segment glow-1"></div>
        <div id="glow-2" class="glow-segment glow-2"></div>
        <div id="glow-3" class="glow-segment glow-3"></div>
        <div id="glow-4" class="glow-segment glow-4"></div>
        <div id="glow-5" class="glow-segment glow-5"></div>
        <div id="glow-6" class="glow-segment glow-6"></div>
        <div id="glow-7" class="glow-segment glow-7"></div>
        <div id="glow-8" class="glow-segment glow-8"></div>
        <div id="glow-9" class="glow-segment glow-9"></div>
        <div id="glow-10" class="glow-segment glow-10"></div>
    </div>

    <div class="auth-container">
        <a href="/" class="btn btn-ghost" style="position: absolute; top: 24px; left: 24px; text-decoration: none; display: flex; align-items: center; gap: 8px; z-index: 10;">
            <i data-lucide="arrow-left" style="width: 18px; height: 18px;"></i>
            Back to Home
        </a>
        <div class="auth-left">
            <h1>Welcome Back</h1>
            <p>Access your global workspace and pick up exactly where you left off. Speed, clarity, and flow—reimagined.</p>
        </div>

        <div class="auth-right">
            <div class="auth-form-wrapper">
                <h2>Sign in</h2>
                
                <form id="login-form">
                    <div class="auth-input-group">
                        <label class="auth-input-label">Your Email</label>
                        <input type="email" id="email" class="auth-underline-input" placeholder="email@example.com" required>
                    </div>
                    <div class="auth-input-group" style="position: relative;">
                        <label class="auth-input-label">Password</label>
                        <input type="password" id="password" class="auth-underline-input" placeholder="••••••••" required>
                        <button type="button" id="toggle-password" style="position: absolute; right: 0; bottom: 8px; background: none; border: none; cursor: pointer; color: var(--text-secondary); padding: 0;">
                            <i data-lucide="eye" style="width: 18px; height: 18px;"></i>
                        </button>
                    </div>
                    
                    <button type="submit" class="auth-btn-primary">
                        Sign in
                    </button>
                </form>

                <p class="auth-footer">
                    New to TaskFlow? <a href="/register" class="auth-link">Create Account</a>
                </p>
            </div>

        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script src="/js/effects.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
